services:
  mysql:
    image: mysql:8.0
    container_name: qlearo_mysql
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qlearo_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL}
    container_name: qlearo_frontend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
