services:
  mysql:
    image: mysql:8.0
    container_name: qlearo_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - qlearo_mysql_data:/var/lib/mysql
    networks:
      - qlearo_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qlearo_backend
    restart: always
    env_file:
      - backend.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - qlearo_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL}
    container_name: qlearo_frontend
    restart: always
    env_file:
      - frontend.env
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - qlearo_network

volumes:
  qlearo_mysql_data:

networks:
  qlearo_network:
    driver: bridge
