name: Deploy Qlearo to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/qlearo_key
          chmod 600 ~/.ssh/qlearo_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare env files
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_VERIFY_SID: ${{ secrets.TWILIO_VERIFY_SID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          mkdir -p deploy-env

          cat > deploy-env/.env <<ENVEOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          EXPO_PUBLIC_API_BASE_URL=${EXPO_PUBLIC_API_BASE_URL}
          ENVEOF

          cat > deploy-env/frontend.env <<ENVEOF
          EXPO_PUBLIC_API_BASE_URL=${EXPO_PUBLIC_API_BASE_URL}
          ENVEOF

          cat > deploy-env/backend.env <<ENVEOF
          SERVER_PORT=8080
          SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
          SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
          SPRING_JPA_HIBERNATE_DDL_AUTO=update

          JWT_SECRET=${JWT_SECRET}

          CORS_ALLOWED_ORIGINS=http://${EC2_HOST},http://${EC2_HOST}:80,http://${EC2_HOST}:8080,http://${EC2_HOST}:8081

          TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
          TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
          TWILIO_VERIFY_SID=${TWILIO_VERIFY_SID}
          TWILIO_VERIFY_SERVICE_SID=${TWILIO_VERIFY_SID}
          TWILIO_SERVICE_SID=${TWILIO_VERIFY_SID}

          GROQ_API_KEY=${GROQ_API_KEY}

          RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
          RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
          RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
          RAZORPAY_CURRENCY=INR

          MAIL_USERNAME=${MAIL_USERNAME}
          MAIL_PASSWORD=${MAIL_PASSWORD}
          MAIL_HOST=smtp.gmail.com
          MAIL_PORT=587

          SPRING_MAIL_HOST=smtp.gmail.com
          SPRING_MAIL_PORT=587
          SPRING_MAIL_USERNAME=${MAIL_USERNAME}
          SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
          SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
          SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
          ENVEOF

          sed -i 's/^          //' deploy-env/.env deploy-env/frontend.env deploy-env/backend.env

      - name: Pull latest code on EC2
        run: |
          ssh -i ~/.ssh/qlearo_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'REMOTE_EOF'
            set -e

            APP_DIR="/home/ubuntu/qlearo"
            REPO_URL="https://github.com/JohnMoses1979/qlearo.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            sudo ufw allow 8081/tcp || true
            sudo ufw allow 8080/tcp || true
          REMOTE_EOF

      - name: Upload env files to EC2
        run: |
          scp -i ~/.ssh/qlearo_key deploy-env/.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/qlearo/.env"
          scp -i ~/.ssh/qlearo_key deploy-env/frontend.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/qlearo/frontend.env"
          scp -i ~/.ssh/qlearo_key deploy-env/backend.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/qlearo/backend.env"

      - name: Docker deploy on EC2
        run: |
          ssh -i ~/.ssh/qlearo_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'REMOTE_EOF'
            set -e

            cd /home/ubuntu/qlearo

            docker compose down
            docker compose up -d --build

            sleep 40

            echo "---- Containers ----"
            docker ps

            echo "---- Frontend check ----"
            curl -I http://localhost:8081

            echo "---- Backend check ----"
            curl -I http://localhost:8080 || true

            echo "---- Backend errors ----"
            if docker compose logs backend --tail=150 | grep -Ei "Application run failed|Could not resolve placeholder|ERROR|Exception"; then
              exit 1
            fi

            echo "Deployment successful"
          REMOTE_EOF
