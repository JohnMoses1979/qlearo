name: Deploy Qlearo to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    env:
      EC2_HOST: "${{ secrets.EC2_HOST }}"
      EC2_USER: "${{ secrets.EC2_USER }}"

      MYSQL_ROOT_PASSWORD: "${{ secrets.MYSQL_ROOT_PASSWORD }}"
      MYSQL_DATABASE: "${{ secrets.MYSQL_DATABASE }}"
      MYSQL_USER: "${{ secrets.MYSQL_USER }}"
      MYSQL_PASSWORD: "${{ secrets.MYSQL_PASSWORD }}"

      EXPO_PUBLIC_API_BASE_URL: "${{ secrets.EXPO_PUBLIC_API_BASE_URL }}"
      JWT_SECRET: "${{ secrets.JWT_SECRET }}"

      TWILIO_ACCOUNT_SID: "${{ secrets.TWILIO_ACCOUNT_SID }}"
      TWILIO_AUTH_TOKEN: "${{ secrets.TWILIO_AUTH_TOKEN }}"
      TWILIO_VERIFY_SID: "${{ secrets.TWILIO_VERIFY_SID }}"

      GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"

      RAZORPAY_KEY_ID: "${{ secrets.RAZORPAY_KEY_ID }}"
      RAZORPAY_KEY_SECRET: "${{ secrets.RAZORPAY_KEY_SECRET }}"
      RAZORPAY_WEBHOOK_SECRET: "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}"

      MAIL_USERNAME: "${{ secrets.MAIL_USERNAME }}"
      MAIL_PASSWORD: "${{ secrets.MAIL_PASSWORD }}"

    steps:
      - name: Setup SSH
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/qlearo_key
          chmod 600 ~/.ssh/qlearo_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Create env files
        shell: bash
        run: |
          set -e
          mkdir -p deploy-env

          {
            echo "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD"
            echo "MYSQL_DATABASE=$MYSQL_DATABASE"
            echo "MYSQL_USER=$MYSQL_USER"
            echo "MYSQL_PASSWORD=$MYSQL_PASSWORD"
            echo "EXPO_PUBLIC_API_BASE_URL=$EXPO_PUBLIC_API_BASE_URL"
          } > deploy-env/.env

          {
            echo "EXPO_PUBLIC_API_BASE_URL=$EXPO_PUBLIC_API_BASE_URL"
          } > deploy-env/frontend.env

          {
            echo "SERVER_PORT=8080"
            echo "SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/$MYSQL_DATABASE?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            echo "SPRING_DATASOURCE_USERNAME=$MYSQL_USER"
            echo "SPRING_DATASOURCE_PASSWORD=$MYSQL_PASSWORD"
            echo "SPRING_JPA_HIBERNATE_DDL_AUTO=update"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "CORS_ALLOWED_ORIGINS=http://$EC2_HOST,http://$EC2_HOST:80,http://$EC2_HOST:8080,http://$EC2_HOST:8081"
            echo "TWILIO_ACCOUNT_SID=$TWILIO_ACCOUNT_SID"
            echo "TWILIO_AUTH_TOKEN=$TWILIO_AUTH_TOKEN"
            echo "TWILIO_VERIFY_SID=$TWILIO_VERIFY_SID"
            echo "TWILIO_VERIFY_SERVICE_SID=$TWILIO_VERIFY_SID"
            echo "TWILIO_SERVICE_SID=$TWILIO_VERIFY_SID"
            echo "GROQ_API_KEY=$GROQ_API_KEY"
            echo "RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID"
            echo "RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET"
            echo "RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET"
            echo "RAZORPAY_CURRENCY=INR"
            echo "MAIL_USERNAME=$MAIL_USERNAME"
            echo "MAIL_PASSWORD=$MAIL_PASSWORD"
            echo "MAIL_HOST=smtp.gmail.com"
            echo "MAIL_PORT=587"
            echo "SPRING_MAIL_HOST=smtp.gmail.com"
            echo "SPRING_MAIL_PORT=587"
            echo "SPRING_MAIL_USERNAME=$MAIL_USERNAME"
            echo "SPRING_MAIL_PASSWORD=$MAIL_PASSWORD"
            echo "SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true"
            echo "SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true"
          } > deploy-env/backend.env

          echo "Generated env files successfully"
          grep "^SPRING_DATASOURCE_URL=" deploy-env/backend.env
          grep "^EXPO_PUBLIC_API_BASE_URL=" deploy-env/frontend.env

      - name: Pull latest code on EC2
        shell: bash
        run: |
          set -e
          ssh -i ~/.ssh/qlearo_key "$EC2_USER@$EC2_HOST" '
            set -e
            APP_DIR="/home/ubuntu/qlearo"
            REPO_URL="https://github.com/JohnMoses1979/qlearo.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            sudo ufw allow 8081/tcp || true
            sudo ufw allow 8080/tcp || true
          '

      - name: Upload env files to EC2
        shell: bash
        run: |
          set -e
          scp -i ~/.ssh/qlearo_key deploy-env/.env "$EC2_USER@$EC2_HOST:/home/ubuntu/qlearo/.env"
          scp -i ~/.ssh/qlearo_key deploy-env/frontend.env "$EC2_USER@$EC2_HOST:/home/ubuntu/qlearo/frontend.env"
          scp -i ~/.ssh/qlearo_key deploy-env/backend.env "$EC2_USER@$EC2_HOST:/home/ubuntu/qlearo/backend.env"

      - name: Docker deploy on EC2
        shell: bash
        run: |
          set -e
          ssh -i ~/.ssh/qlearo_key "$EC2_USER@$EC2_HOST" '
            set -e
            cd /home/ubuntu/qlearo

            echo "---- backend.env DB check ----"
            grep "^SPRING_DATASOURCE_URL=" backend.env
            grep "^SPRING_DATASOURCE_USERNAME=" backend.env

            echo "---- Docker deploy ----"
            docker compose down
            docker compose up -d --build

            sleep 60

            echo "---- Containers ----"
            docker ps

            echo "---- Frontend check ----"
            curl -I http://localhost:8081

            echo "---- Backend check ----"
            curl -I http://localhost:8080 || true

            echo "---- Backend fatal errors ----"
            if docker compose logs backend --tail=200 | grep -Ei "Application run failed|Could not resolve placeholder|Unable to determine Dialect|Access denied|Communications link failure"; then
              exit 1
            fi

            echo "Deployment successful"
          '
