name: Deploy Qlearo to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_KEY_B64: ${{ secrets.EC2_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_KEY_B64" | base64 -d > ~/.ssh/qlearo_key
          chmod 600 ~/.ssh/qlearo_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/qlearo_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST "echo SSH_OK"

      - name: Create env files
        run: |
          rm -f backend.env frontend.env

          printf "%s\n" \
            "MYSQL_ROOT_PASSWORD=root" \
            "MYSQL_DATABASE=qlearo_db" \
            "SERVER_PORT=8080" \
            "SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/qlearo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC" \
            "SPRING_DATASOURCE_USERNAME=root" \
            "SPRING_DATASOURCE_PASSWORD=root" \
            "SPRING_JPA_HIBERNATE_DDL_AUTO=update" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" \
            "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" \
            "TWILIO_VERIFY_SID=${{ secrets.TWILIO_VERIFY_SID }}" \
            "TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}" \
            "TWILIO_SERVICE_SID=${{ secrets.TWILIO_SERVICE_SID }}" \
            "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
            "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            "RAZORPAY_CURRENCY=INR" \
            "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" \
            "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" \
            "MAIL_HOST=smtp.gmail.com" \
            "MAIL_PORT=587" \
            "SPRING_MAIL_HOST=smtp.gmail.com" \
            "SPRING_MAIL_PORT=587" \
            "SPRING_MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" \
            "SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" \
            "SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true" \
            "SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true" \
            "CORS_ALLOWED_ORIGINS=http://16.208.59.201,http://16.208.59.201:80,http://16.208.59.201:8081,http://16.208.59.201:8080,http://localhost:8081,http://localhost:19006" \
            > backend.env

          printf "%s\n" \
            "EXPO_PUBLIC_API_BASE_URL=http://16.208.59.201:8080/api" \
            > frontend.env

          echo "---- backend.env check ----"
          grep -E "MYSQL_DATABASE|SPRING_DATASOURCE_URL|SPRING_DATASOURCE_USERNAME|SPRING_DATASOURCE_PASSWORD" backend.env

      - name: Pull latest code on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/qlearo_key ubuntu@$EC2_HOST "
            cd ~/qlearo &&
            git fetch origin main &&
            git reset --hard origin/main &&
            git clean -fd -e backend/.env -e .env -e node_modules -e uploads -e backend/uploads -e qlearo.apk
          "

      - name: Upload env files to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          scp -i ~/.ssh/qlearo_key backend.env ubuntu@$EC2_HOST:~/qlearo/backend/.env
          scp -i ~/.ssh/qlearo_key frontend.env ubuntu@$EC2_HOST:~/qlearo/.env

      - name: Docker deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/qlearo_key ubuntu@$EC2_HOST "
            cd ~/qlearo &&
            echo '---- backend env check ----' &&
            grep -E 'MYSQL_DATABASE|SPRING_DATASOURCE_URL|SPRING_DATASOURCE_USERNAME|SPRING_DATASOURCE_PASSWORD' backend/.env &&
            echo '---- docker compose deploy ----' &&
            sudo docker compose down &&
            sudo docker compose up -d --build &&
            sudo docker ps
          "
