name: Deploy Qlearo to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/qlearo_key
          chmod 600 ~/.ssh/qlearo_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/qlearo_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'REMOTE_EOF'
          set -e

          APP_DIR="/home/ubuntu/qlearo"
          REPO_URL="https://github.com/JohnMoses1979/qlearo.git"

          if [ ! -d "$APP_DIR/.git" ]; then
            rm -rf "$APP_DIR"
            git clone "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"

          echo "---- Pull latest code ----"
          git fetch origin main
          git reset --hard origin/main

          echo "---- Create .env ----"
          cat > .env <<ENVEOF
MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
MYSQL_USER=${{ secrets.MYSQL_USER }}
MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
ENVEOF

          echo "---- Create frontend.env ----"
          cat > frontend.env <<ENVEOF
EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
ENVEOF

          echo "---- Create backend.env ----"
          cat > backend.env <<ENVEOF
SERVER_PORT=8080

SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${{ secrets.MYSQL_DATABASE }}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
SPRING_JPA_HIBERNATE_DDL_AUTO=update

JWT_SECRET=${{ secrets.JWT_SECRET }}

CORS_ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }},http://${{ secrets.EC2_HOST }}:80,http://${{ secrets.EC2_HOST }}:8080,http://${{ secrets.EC2_HOST }}:8081

TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
TWILIO_VERIFY_SID=${{ secrets.TWILIO_VERIFY_SID }}
TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SID }}
TWILIO_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SID }}

GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
RAZORPAY_CURRENCY=INR

MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587

SPRING_MAIL_HOST=smtp.gmail.com
SPRING_MAIL_PORT=587
SPRING_MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
ENVEOF

          echo "---- Open firewall ports ----"
          sudo ufw allow 8081/tcp || true
          sudo ufw allow 8080/tcp || true

          echo "---- Docker deploy ----"
          docker compose down
          docker compose up -d --build

          echo "---- Wait for services ----"
          sleep 40

          echo "---- Containers ----"
          docker ps

          echo "---- Health checks ----"
          curl -I http://localhost:8081
          curl -I http://localhost:8080 || true

          echo "---- Backend errors ----"
          docker compose logs backend --tail=120 | grep -Ei "Application run failed|Could not resolve placeholder|ERROR|Exception" && exit 1 || true

          echo "Deployment successful"
          REMOTE_EOF
